<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sample.css">
    <title>Document</title>
</head>
<body>
    <h1>TEMPLATE ELEMENT EXAMPLE</h1>
    <p id="p1">One of the Wonders of the World</p>
    <button onclick="showContent()">wilder Beasts</button>
    <template id="temp1">
        <h2>Wildlife</h2>
        <img src="https://plus.unsplash.com/premium_photo-1661843615544-b2c973491c8b?w=800&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8d2lsZGxpZmV8ZW58MHx8MHx8fDA%3D" alt="Wilder Beast crossing the Mara river" width="500" height="500" object-fit="cover">
    </template>
    <script>
        function showContent() {
            let temp=document.getElementsByTagName("template")[0];
            let clone= temp.content.cloneNode(true);
            document.body.appendChild(clone);
        }
    </script>
</body>
</html>
